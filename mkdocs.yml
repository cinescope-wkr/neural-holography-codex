site_name: Awesome Neural Holography
site_description: A curated list of resources on neural holographic displays.
site_url: https://cinescope-wkr.github.io/awesome-neural-holography/
repo_url: https://github.com/cinescope-wkr/awesome-neural-holography
repo_name: cinescope-wkr/awesome-neural-holography
docs_dir: docs
site_dir: site
plugins:
  - search
extra:
  generator: false
copyright: A growable codex for neural holography research.
theme:
  name: material
  favicon: assets/favicon.svg
  icon:
    top: material/chevron-up
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
nav:
  - Home: index.md
  - Codex:
      - Full Codex: readme.md
      - Browse by Section: reading-list/index.md
      - Section Views:
          - Background and Survey: reading-list/background-and-survey.md
          - CGH Algorithms: reading-list/cgh-algorithms.md
          - Display Systems: reading-list/display-systems.md
          - Software: reading-list/software.md
          - Labs and Research Groups: reading-list/labs-and-researchers.md
          - Venues and Communities: reading-list/venues-and-communities.md
          - Media and Resources: reading-list/media-and-resources.md
  - Subtopics:
      - Holographic Projection: subtopics/holographic_projection.md
      - Speckle Reduction: subtopics/speckle_reduction.md
      - Zero-order Diffraction Removal: subtopics/zero_orders.md
  - Contributing: contributing.md
hooks:
  - mkdocs_hooks.py
watch:
  - README.md
  - subtopics
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
