    <ellipse cx="32" cy="32" rx="4.6" ry="1.45" fill="url(#waistCore)"/>
    <path d="M28.4 26.8V37.2" fill="none" stroke="url(#fringeStroke)" stroke-opacity=".82" stroke-width=".8" stroke-linecap="round"/>
    <path d="M30.2 26.2V37.8" fill="none" stroke="url(#fringeStroke)" stroke-opacity=".92" stroke-width=".8" stroke-linecap="round"/>
    <path d="M32 25.8V38.2" fill="none" stroke="url(#fringeStroke)" stroke-opacity="1" stroke-width=".95" stroke-linecap="round"/>
    <path d="M33.8 26.2V37.8" fill="none" stroke="url(#fringeStroke)" stroke-opacity=".92" stroke-width=".8" stroke-linecap="round"/>
    <path d="M35.6 26.8V37.2" fill="none" stroke="url(#fringeStroke)" stroke-opacity=".82" stroke-width=".8" stroke-linecap="round"/>
