    </clipPath>
    <radialGradient id="waistGlow" cx="32" cy="32" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 32) scale(8.5 3)">
      <stop offset="0" stop-color="#f8fffb" stop-opacity=".82"/>
      <stop offset=".38" stop-color="#dcfce7" stop-opacity=".34"/>
      <stop offset="1" stop-color="#86efac" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="waistCore" cx="32" cy="32" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 32) scale(4.6 1.45)">
