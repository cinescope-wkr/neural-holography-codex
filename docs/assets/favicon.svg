<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Neural Holography favicon</title>
  <desc id="desc">A minimal green laser beam with a beam waist, interference fringes, and a Gaussian intensity profile.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020705"/>
      <stop offset="1" stop-color="#09120d"/>
    </linearGradient>
    <linearGradient id="beamOuter" x1="18" y1="32" x2="46" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e" stop-opacity=".14"/>
      <stop offset=".5" stop-color="#86efac" stop-opacity=".22"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity=".14"/>
    </linearGradient>
    <linearGradient id="beamMid" x1="18" y1="32" x2="46" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#bbf7d0" stop-opacity=".28"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="beamInner" x1="18" y1="32" x2="46" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bbf7d0" stop-opacity=".12"/>
      <stop offset=".5" stop-color="#f0fdf4" stop-opacity=".26"/>
      <stop offset="1" stop-color="#bbf7d0" stop-opacity=".12"/>
    </linearGradient>
    <clipPath id="beamClip">
